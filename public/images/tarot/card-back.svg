<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" fill="none">
  <defs>
    <!-- 빈티지 어두운 배경 그라디언트 -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#2A1008"/>
      <stop offset="100%" stop-color="#0E0402"/>
    </radialGradient>
    <!-- 다이아몬드 격자 패턴 (라이더-웨이트 스타일) -->
    <pattern id="diamonds" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M5,0 L10,5 L5,10 L0,5 Z" fill="none" stroke="#C8A84B" stroke-width="0.25"/>
    </pattern>
    <clipPath id="bodyClip">
      <rect x="9" y="9" width="102" height="182" rx="2.5"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="120" height="200" rx="7" fill="url(#bgGrad)"/>

  <!-- 다이아몬드 격자 (클립 적용) -->
  <rect x="9" y="9" width="102" height="182" rx="2.5"
        fill="url(#diamonds)" clip-path="url(#bodyClip)" opacity="0.18"/>

  <!-- 외곽 테두리 (굵은 금색) -->
  <rect x="3" y="3" width="114" height="194" rx="6"
        fill="none" stroke="#C8A84B" stroke-width="1.2"/>
  <!-- 내부 테두리 (가는 금색) -->
  <rect x="7.5" y="7.5" width="105" height="185" rx="4"
        fill="none" stroke="#C8A84B" stroke-width="0.4" opacity="0.55"/>

  <!-- 상단 장식 가로선 -->
  <line x1="14" y1="28" x2="106" y2="28" stroke="#C8A84B" stroke-width="0.4" opacity="0.45"/>
  <!-- 하단 장식 가로선 -->
  <line x1="14" y1="172" x2="106" y2="172" stroke="#C8A84B" stroke-width="0.4" opacity="0.45"/>

  <!-- 네 모서리 다이아몬드 장식 -->
  <path d="M14,17 L17.5,22 L14,27 L10.5,22 Z" fill="#C8A84B" opacity="0.5"/>
  <path d="M106,17 L109.5,22 L106,27 L102.5,22 Z" fill="#C8A84B" opacity="0.5"/>
  <path d="M14,173 L17.5,178 L14,183 L10.5,178 Z" fill="#C8A84B" opacity="0.5"/>
  <path d="M106,173 L109.5,178 L106,183 L102.5,178 Z" fill="#C8A84B" opacity="0.5"/>

  <!-- 중앙 원형 메달리온 배경 -->
  <ellipse cx="60" cy="96" rx="33" ry="43"
           fill="#120703" stroke="#C8A84B" stroke-width="0.7" opacity="1"/>
  <ellipse cx="60" cy="96" rx="29" ry="39"
           fill="none" stroke="#C8A84B" stroke-width="0.3" opacity="0.4"/>

  <!-- 중앙 신비 문양: 수레바퀴(Wheel) 스타일 -->
  <g transform="translate(60, 96)">
    <!-- 바깥 원 -->
    <circle r="21" fill="none" stroke="#C8A84B" stroke-width="0.5" opacity="0.45"/>
    <!-- 8개 바퀴살 -->
    <line x1="0" y1="-21" x2="0" y2="21" stroke="#C8A84B" stroke-width="0.35" opacity="0.3"/>
    <line x1="-21" y1="0" x2="21" y2="0" stroke="#C8A84B" stroke-width="0.35" opacity="0.3"/>
    <line x1="-14.8" y1="-14.8" x2="14.8" y2="14.8" stroke="#C8A84B" stroke-width="0.35" opacity="0.3"/>
    <line x1="14.8" y1="-14.8" x2="-14.8" y2="14.8" stroke="#C8A84B" stroke-width="0.35" opacity="0.3"/>
    <!-- 중간 원 -->
    <circle r="12" fill="none" stroke="#C8A84B" stroke-width="0.5" opacity="0.5"/>
    <!-- 8각별 -->
    <path d="M0,-10 L2.5,-2.5 L10,0 L2.5,2.5 L0,10 L-2.5,2.5 L-10,0 L-2.5,-2.5 Z"
          fill="#C8A84B" opacity="0.32"/>
    <!-- 내부 원 -->
    <circle r="5" fill="#120703" stroke="#C8A84B" stroke-width="0.6" opacity="0.7"/>
    <!-- 중심점 -->
    <circle r="1.5" fill="#C8A84B" opacity="0.75"/>
  </g>

  <!-- 방위 장식 소점 (위/아래/좌/우) -->
  <circle cx="60" cy="38" r="1.2" fill="#C8A84B" opacity="0.4"/>
  <circle cx="60" cy="154" r="1.2" fill="#C8A84B" opacity="0.4"/>
  <circle cx="20" cy="96" r="1.2" fill="#C8A84B" opacity="0.35"/>
  <circle cx="100" cy="96" r="1.2" fill="#C8A84B" opacity="0.35"/>

  <!-- 텍스트 장식선 -->
  <line x1="20" y1="163" x2="34" y2="163" stroke="#C8A84B" stroke-width="0.4" opacity="0.35"/>
  <line x1="86" y1="163" x2="100" y2="163" stroke="#C8A84B" stroke-width="0.4" opacity="0.35"/>

  <!-- 심봉이 타로 텍스트 -->
  <text x="60" y="166.5" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="7" fill="#C8A84B" opacity="0.6" letter-spacing="0.8">심봉이 타로</text>
</svg>
